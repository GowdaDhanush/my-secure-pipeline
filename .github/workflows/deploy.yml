name: Production-Grade Multi-Environment Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-secure-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-secure-app:${{ github.sha }}

      # ==========================================
      # NEW STEP: AUTOMATED SECURITY SCANNING
      # ==========================================
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: 'docker.io/${{ secrets.DOCKERHUB_USERNAME }}/my-secure-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'  # This tells the robot: "If you find Critical bugs, BREAK the pipeline!"
          severity: 'CRITICAL,HIGH'

  deploy-to-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Simulation
        run: echo "Successfully deployed version ${{ github.sha }} to Staging!"
