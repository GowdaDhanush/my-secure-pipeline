name: Production-Grade Multi-Environment Pipeline

# 1. Trigger: Run this factory line every time code is committed to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # JOB 1: PACKAGE THE CODE INTO A CONTAINER
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This step logs into Docker Hub using the secrets you just saved
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # This step builds your Dockerfile blueprint and uploads it to Docker Hub
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-secure-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-secure-app:${{ github.sha }}

  # ==========================================
  # JOB 2: AUTOMATICALLY DEPLOY TO STAGING
  # ==========================================
  deploy-to-staging:
    needs: build-and-test # Wait until the container builds perfectly before deploying
    runs-on: ubuntu-latest
    steps:
      - name: Simulation
        run: echo "Successfully deployed version ${{ github.sha }} to Staging!"
